<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SmartHome Security Lab</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; text-align: center; }
        .device-box { border: 1px solid #ddd; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #fafafa; }
        input[type="text"] { width: 75%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; background: #3498db; color: white; cursor: pointer; }
        #log-area { margin-top: 20px; padding: 15px; border-radius: 5px; background: #333; color: #00ff00; font-family: monospace; min-height: 50px; }
        .hint { font-size: 0.8em; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏠 SmartHome</h1>
    
    <div class="device-box">
        <h3>⚙️ 시스템 설정</h3>
        <p>기기 별명을 설정하세요 :</p>
	<input type="text" id="nickname-input">
        <button onclick="saveSettings()">설정 저장</button>
        <div id="display-name" style="margin-top:10px;"></div>
    </div>

    <div class="device-box" style="border-color: #e74c3c;">
        <h3>🔒 관리자 로그 확인</h3>
        <button onclick="viewAdminLogs()" style="background:#e74c3c;">로그 불러오기</button>
        <div id="log-area">접근 권한이 없습니다.</div>
    </div>
</div>



<script>
    function saveSettings() {
        const input = document.getElementById('nickname-input').value;
        document.getElementById('display-name').innerHTML = "현재 별명: " + input;
        alert("설정이 반영되었습니다.");
    }

    function viewAdminLogs() {
        const logArea = document.getElementById('log-area');
        
        var systemConfig = window.config || { admin: false };

        if (systemConfig.admin) {
            
            setTimeout(() => {
                const secret = "RE9Ne0Nsb2JiZXJpbmdfU3VjY2Vzc19IYWNrZXJ9"; 
                logArea.innerHTML = "🔓 [SUCCESS] " + atob(secret);
            }, 1000);
        } else {
            logArea.innerText = "❌ 거부됨: 관리자(admin)가 아닙니다.";
        }
    }
</script>

</body>
</html>
