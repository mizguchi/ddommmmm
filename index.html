<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SmartHome</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 650px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .device { border: 1px solid #eee; padding: 15px; border-radius: 10px; background: #fff; position: relative; }
        .device h3 { margin-top: 0; font-size: 1.1em; color: #555; }
        .temp-val { font-size: 1.5em; font-weight: bold; color: #ff9800; }
        
        /* 설정 영역 */
        .settings { grid-column: span 2; border: 2px solid #e8f0fe; background: #f8faff; }
        input[type="text"] { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-top: 5px; }
        
        /* 비밀 데이터 영역 */
        .secret-area { grid-column: span 2; background: #fff5f5; border: 2px dashed #ff5252; padding: 20px; border-radius: 10px; text-align: center; margin-top: 10px; }
        #log-display { font-weight: bold; font-size: 1.2em; margin: 10px 0; color: #ff5252; }
        
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 5px; background: #1a73e8; color: white; transition: 0.2s; }
        button:hover { background: #1557b0; }
        .btn-off { background: #9e9e9e; }
        .btn-save { background: #34a853; width: 20%; height: 40px; vertical-align: bottom; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏠 My SmartHome</h1>

    <div class="grid">
        <div class="device">
            <h3>💡 거실 전등</h3>
            <button onclick="alert('거실 전등 ON')">켜기</button>
            <button class="btn-off" onclick="alert('거실 전등 OFF')">끄기</button>
        </div>

        <div class="device">
            <h3>🌡️ 실내 환경</h3>
            <div>온도: <span class="temp-val" id="temp">24</span>°C</div>
            <div>습도: <span style="font-weight:bold; color:#2196f3;">45%</span></div>
            <button style="margin-top:5px; padding:2px 10px;" onclick="changeTemp(1)">+</button>
            <button style="margin-top:5px; padding:2px 10px;" onclick="changeTemp(-1)">-</button>
        </div>

        <div class="device">
            <h3>❄️ 에어컨</h3>
            <button onclick="alert('에어컨 가동')">가동</button>
            <button class="btn-off" onclick="alert('에어컨 중지')">중지</button>
        </div>

        <div class="device">
            <h3>🍃 공기청정기</h3>
            <button onclick="alert('공기청정기 시작')">Auto</button>
            <button class="btn-off" onclick="alert('공기청정기 종료')">정지</button>
        </div>

        <div class="device settings">
            <h3>⚙️ 기기 별명 변경</h3>
            <input type="text" id="nickname-input" placeholder="<form id='secret'><input name='isLocked'></form>">
            <button class="btn-save" onclick="updateAndClobber()">저장</button>
            <div id="nickname-display" style="margin-top:10px; font-style: italic;"></div>
        </div>

        <div class="secret-area">
            <h3>🔒 체중 기록</h3>
            <div id="log-display">🔒 데이터가 잠겨 있습니다.</div>
        </div>
    </div>
</div>

<script>
    // 온도 조절 기능
    function changeTemp(val) {
        const tempEl = document.getElementById('temp');
        tempEl.innerText = parseInt(tempEl.innerText) + val;
    }

    // [!] 핵심 취약점 함수: 저장과 동시에 클로버링 확인
    function updateAndClobber() {
        const input = document.getElementById('nickname-input').value;
        
        // 1. 별명 표시창에 HTML 주입 (innerHTML 취약점)
        document.getElementById('nickname-display').innerHTML = "설정된 별명: " + input;

        // 2. DOM Clobbering 발생 및 즉시 체크
        // 함수가 실행될 때 window.secret을 참조하므로 주입된 HTML 요소가 잡힘
        var secretConfig = window.secret || {
            isLocked: false,
            msg: "기본 잠금 상태"
        };

        const display = document.getElementById('log-display');
        const flag = "FLAG{DOM_Clobbering_Smart_Home_Success!}";

        console.log("현재 secret 객체:", secretConfig);

        // 3. 로직 확인: secretConfig.isLocked가 HTML 요소(객체)면 참(True)으로 판정
        if (secretConfig.isLocked) {
            display.innerText = "🔓 인증 성공: " + flag;
            display.style.color = "#1a73e8";
            display.parentElement.style.borderColor = "#1a73e8";
            display.parentElement.style.backgroundColor = "#e8f0fe";
        } else {
            display.innerText = "🔒 인증 필요: 데이터가 잠겨 있습니다.";
            display.style.color = "#ff5252";
        }
    }
</script>

</body>

</html>
